name: CatechHub
description: "Il tuo registro di catechismo"
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Gestione Stato e Navigazione (Mantenuti)
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  local_auth: ^2.1.0

  # Database Locale e Crittografia (Nuovi)
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.2.0 # Serve per salvare la chiave di cifratura in modo sicuro nel portachiavi del telefono
  crypto: ^3.0.0 # Per hashing sicuro del PIN con SHA256 + salt

  # Scambio Dati (backup futuro)
  file_picker: ^12.0.0-beta.4
  
  # QR Code e Scansione Offline
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  compress: ^1.0.0

  # UI e Utility
  intl: ^0.20.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  package_info_plus: ^10.0.0
  device_info_plus: ^13.1.0
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  wiredash: ^2.6.1
  image_picker: ^1.1.0
  path_provider: ^2.1.0 # Accedere app documents directory
  image: ^4.8.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png